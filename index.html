<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冷笑 vs 熱笑 診断テスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-50:#EEEDFE;--purple-200:#AFA9EC;--purple-400:#7F77DD;
      --purple-600:#534AB7;--purple-800:#3C3489;--purple-900:#26215C;
      --pink-50:#FBEAF0;--pink-200:#ED93B1;--pink-400:#D4537E;
      --pink-600:#993556;--pink-800:#72243E;
      --gray-50:#F8F7F4;--gray-100:#F1EFE8;--gray-200:#D3D1C7;
      --gray-400:#888780;--gray-600:#5F5E5A;
      --text-primary:#1a1a1a;--text-secondary:#666;--text-tertiary:#999;
      --border:rgba(0,0,0,0.1);--radius-md:12px;--radius-lg:18px;--radius-xl:24px;
    }
    body { font-family:'Zen Maru Gothic',sans-serif; background:var(--gray-50); color:var(--text-primary); min-height:100vh; line-height:1.6; }
    .page { max-width:680px; margin:0 auto; padding:1.5rem 1rem; }
    .screen { display:none; }
    .screen.active { display:block; }

    /* AD */
    .ad-slot { width:100%; margin:1rem auto; min-height:90px; background:var(--gray-100); border:1px dashed var(--gray-200); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); font-size:12px; }
    .ad-slot-rect { min-height:200px; }

    /* TITLE */
    .title-screen { text-align:center; padding:2rem 0 3rem; }
    .title-badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.15em; padding:4px 16px; border-radius:20px; background:var(--purple-50); color:var(--purple-600); margin-bottom:1.5rem; }
    h1.title-main { font-size:clamp(2rem,6vw,2.8rem); font-weight:900; line-height:1.2; margin-bottom:.75rem; }
    .title-main span.cool { color:var(--purple-600); }
    .title-main span.hot { color:var(--pink-400); }
    .title-sub { font-size:.95rem; color:var(--text-secondary); margin-bottom:2.5rem; line-height:1.7; }
    .mascot-row { display:flex; justify-content:center; gap:2.5rem; margin-bottom:2.5rem; }
    .mascot-preview { display:flex; flex-direction:column; align-items:center; gap:.5rem; }
    .mascot-preview span { font-size:12px; font-weight:700; color:var(--text-secondary); }
    .start-btn { display:inline-block; padding:1rem 3.5rem; font-size:1.1rem; font-weight:900; font-family:'Zen Maru Gothic',sans-serif; border-radius:50px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--purple-800),var(--purple-600)); color:white; transition:transform .15s,box-shadow .15s; box-shadow:0 6px 24px rgba(83,74,183,.35); letter-spacing:.05em; }
    .start-btn:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(83,74,183,.45); }

    /* QUIZ */
    .progress-bar-bg { height:6px; background:var(--gray-200); border-radius:3px; margin-bottom:1.5rem; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--purple-600),var(--pink-400)); transition:width .45s cubic-bezier(.4,0,.2,1); }
    .q-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .q-counter { font-size:12px; font-weight:700; color:var(--text-tertiary); }
    .q-text { font-size:1.1rem; font-weight:700; line-height:1.7; margin-bottom:1.5rem; min-height:56px; }
    .choices { display:flex; flex-direction:column; gap:.75rem; margin-bottom:1.25rem; }
    .choice-btn { padding:1rem 1.25rem; border-radius:var(--radius-lg); border:1.5px solid var(--border); background:white; color:var(--text-primary); font-family:'Zen Maru Gothic',sans-serif; font-size:.9rem; font-weight:500; text-align:left; cursor:pointer; transition:all .18s; line-height:1.6; }
    .choice-btn:hover:not(:disabled) { border-color:var(--purple-400); background:var(--purple-50); transform:translateX(5px); }
    .choice-btn:disabled { cursor:default; }
    .choice-btn.selected-cool { border-color:var(--purple-600); background:var(--purple-50); color:var(--purple-900); }
    .choice-btn.selected-hot { border-color:var(--pink-400); background:var(--pink-50); color:var(--pink-800); }

    /* BACK BUTTON */
    .back-btn { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1.2rem; border-radius:50px; border:1.5px solid var(--border); background:white; color:var(--text-secondary); font-family:'Zen Maru Gothic',sans-serif; font-size:.82rem; font-weight:700; cursor:pointer; transition:all .15s; }
    .back-btn:hover { background:var(--gray-100); transform:translateY(-1px); }
    .back-btn:disabled { opacity:.3; cursor:default; transform:none; }

    /* RESULT */
    .result-screen { text-align:center; }
    .result-header h2 { font-size:1.5rem; font-weight:900; margin-bottom:.25rem; }
    .result-header p { font-size:.85rem; color:var(--text-secondary); margin-bottom:1.5rem; }
    .result-main-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius-xl); padding:2.5rem 2rem; margin-bottom:1.5rem; position:relative; overflow:hidden; }
    .result-main-card::before { content:''; position:absolute; top:0;left:0;right:0; height:4px; }
    .result-main-card.cool-result::before { background:linear-gradient(90deg,var(--purple-800),var(--purple-400)); }
    .result-main-card.hot-result::before { background:linear-gradient(90deg,var(--pink-600),var(--pink-200)); }
    .result-type-badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.12em; padding:4px 16px; border-radius:20px; margin-bottom:1.25rem; }
    .cool-badge { background:var(--purple-50); color:var(--purple-600); }
    .hot-badge { background:var(--pink-50); color:var(--pink-600); }
    .result-animal-wrap { margin:0 auto 1.25rem; width:120px; height:120px; }
    .result-pct { font-size:3.5rem; font-weight:900; line-height:1; margin-bottom:.25rem; }
    .cool-pct { color:var(--purple-600); }
    .hot-pct { color:var(--pink-400); }
    .result-animal-name { font-size:1.5rem; font-weight:900; margin-bottom:.75rem; }
    .result-animal-desc { font-size:.9rem; color:var(--text-secondary); line-height:1.7; max-width:360px; margin:0 auto; }
    .result-sub-scores { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.5rem; }
    .sub-score-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius-md); padding:1rem; }
    .sub-score-label { font-size:11px; font-weight:700; color:var(--text-tertiary); margin-bottom:.25rem; }
    .sub-score-value { font-size:1.8rem; font-weight:900; }
    .result-detail-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1rem; text-align:left; }
    .detail-card-title { font-size:.75rem; font-weight:700; letter-spacing:.1em; color:var(--text-tertiary); margin-bottom:.75rem; }
    .compat-row { display:flex; align-items:center; gap:.75rem; margin-bottom:.5rem; }
    .compat-tag { font-size:.75rem; font-weight:700; padding:2px 10px; border-radius:20px; white-space:nowrap; }
    .compat-good { background:#e8f5e9; color:#2e7d32; }
    .compat-bad { background:#fce4ec; color:#c62828; }
    .trait-list { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.5rem; }
    .trait-chip { font-size:.8rem; padding:4px 12px; border-radius:20px; background:var(--gray-100); color:var(--text-secondary); font-weight:700; }
    .result-comment { background:var(--gray-100); border-radius:var(--radius-md); padding:1.25rem 1.5rem; font-size:.9rem; color:var(--text-primary); line-height:1.8; text-align:left; margin-bottom:1.5rem; }

    /* SHARE */
    .share-section { margin-bottom:1.5rem; }
    .share-label { font-size:.8rem; font-weight:700; color:var(--text-tertiary); margin-bottom:.75rem; }
    .share-btns { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; }
    .share-btn { display:inline-flex; align-items:center; gap:.5rem; padding:.7rem 1.4rem; border-radius:50px; border:none; font-family:'Zen Maru Gothic',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; transition:all .15s; }
    .share-btn:hover { transform:translateY(-2px); opacity:.9; }
    .share-btn-x { background:#000; color:white; }
    .share-btn-line { background:#00B900; color:white; }
    .share-btn-copy { background:white; color:var(--text-primary); border:1.5px solid var(--border); }
    .retry-btn { display:inline-block; padding:.8rem 2.5rem; font-size:.95rem; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; border-radius:50px; border:1.5px solid var(--border); cursor:pointer; background:white; color:var(--text-primary); transition:all .15s; margin-bottom:2rem; }
    .retry-btn:hover { background:var(--gray-100); transform:translateY(-2px); }

    @keyframes popIn { 0%{transform:scale(.6) rotate(-5deg);opacity:0} 65%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .pop-in { animation:popIn .55s cubic-bezier(.34,1.56,.64,1) forwards; }
    .fade-up { animation:fadeUp .4s ease forwards; }
    .d1{animation-delay:.1s;opacity:0}.d2{animation-delay:.2s;opacity:0}
    .d3{animation-delay:.35s;opacity:0}.d4{animation-delay:.5s;opacity:0}
    .d5{animation-delay:.65s;opacity:0}.d6{animation-delay:.8s;opacity:0}

    @media(max-width:480px){ .mascot-row{gap:1.5rem} .result-main-card{padding:2rem 1.25rem} .share-btns{flex-direction:column;align-items:center} }
  </style>
</head>
<body>
<div class="page">

  <!-- タイトル画面 -->
  <div id="title-screen" class="screen active title-screen">
    <div class="ad-slot" style="margin-bottom:1.5rem">📢 広告スペース（728×90）</div>
    <div class="title-badge">2025年版 SNS世代診断</div>
    <h1 class="title-main"><span class="cool">冷笑</span> vs <span class="hot">熱笑</span><br>診断テスト</h1>
    <p class="title-sub">あなたは「うおw」「ど、どわーwww」な<strong>冷笑系</strong>？<br>それとも全力まっすぐな<strong>熱笑系</strong>？<br>15問に答えてあなたのキャラを診断！</p>
    <div class="mascot-row">

        <span>冷笑ライオン</span>
      </div>
      <div class="mascot-preview">
        <svg width="90" height="90" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#FBEAF0"/><ellipse cx="50" cy="72" rx="18" ry="10" fill="#F4C0D1"/><ellipse cx="50" cy="55" rx="24" ry="26" fill="#ED93B1"/><circle cx="50" cy="46" r="20" fill="#FAEEDA"/><circle cx="42" cy="43" r="4" fill="#411A0C"/><circle cx="58" cy="43" r="4" fill="#411A0C"/><circle cx="43" cy="42" r="1.5" fill="white"/><circle cx="59" cy="42" r="1.5" fill="white"/><ellipse cx="50" cy="51" rx="7" ry="5" fill="#F0997B"/><path d="M43 57 Q50 63 57 57" stroke="#633806" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="32" cy="32" rx="9" ry="13" fill="#ED93B1" transform="rotate(-20,32,32)"/><ellipse cx="68" cy="32" rx="9" ry="13" fill="#ED93B1" transform="rotate(20,68,32)"/></svg>
        <span>熱笑いぬ</span>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">診断スタート！</button>
    <div class="ad-slot ad-slot-rect" style="margin-top:2rem;max-width:300px">📢 広告スペース（300×250）</div>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz-screen" class="screen">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="q-meta">
      <span class="q-counter" id="q-counter">1 / 15</span>
      <button class="back-btn" id="back-btn" onclick="goBack()" disabled>← 前の問題</button>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div id="quiz-ad-area"></div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="screen result-screen">
    <div class="ad-slot fade-up" style="margin-bottom:1.5rem">📢 広告スペース（728×90）</div>
    <div class="result-header fade-up">
      <h2>診断結果</h2>
      <p>あなたのリアルなキャラが明らかに…！</p>
    </div>
    <div id="result-main-card" class="result-main-card fade-up d1">
      <div id="result-type-badge" class="result-type-badge"></div>
      <div class="result-animal-wrap pop-in" id="result-animal-svg"></div>
      <div class="result-pct" id="result-pct"></div>
      <div class="result-animal-name" id="result-animal-name"></div>
      <div class="result-animal-desc" id="result-animal-desc"></div>
    </div>
    <div class="result-sub-scores fade-up d2" id="result-sub-scores"></div>
    <div class="ad-slot ad-slot-rect fade-up d2" style="max-width:300px;margin-bottom:1.5rem">📢 広告スペース（300×250）</div>
    <div class="result-comment fade-up d3" id="result-comment"></div>
    <div id="result-detail-area"></div>
    <div class="ad-slot fade-up d4" style="margin-bottom:1.5rem">📢 広告スペース（728×90）</div>
    <div class="share-section fade-up d4">
      <div class="share-label">📣 結果をシェアする</div>
      <div class="share-btns">
        <button class="share-btn share-btn-x" onclick="shareX()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.737-8.835L1.254 2.25H8.08l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Xでポスト
        </button>
        <button class="share-btn share-btn-line" onclick="shareLine()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>

        <button class="share-btn share-btn-copy" id="copy-btn" onclick="copyLink()">🔗 リンクをコピー</button>
      </div>
    </div>
    <div class="ad-slot ad-slot-rect fade-up d5" style="max-width:300px;margin-bottom:1.5rem">📢 広告スペース（300×250）</div>
    <button class="retry-btn fade-up d6" onclick="resetQuiz()">もう一度やる</button>
    <div class="ad-slot fade-up d6" style="margin-bottom:1rem">📢 広告スペース（728×90）</div>
  </div>

</div>
<script>
// ── 問題（15問）──
const questions = [
  { text:"友達が新しい趣味を始めたと話してくれた。どう反応する？", choices:[
    {text:"「うおw どんな趣味？w」って感じで若干引きながら聞く",cool:3,hot:0},
    {text:"「えー！すごい、どんな感じ？」って素直に興味を示す",cool:0,hot:3},
    {text:"「ああ…またそういうの始めたんだ」ってなる",cool:2,hot:0},
    {text:"「一緒にやろう！」って即乗っかる",cool:0,hot:2}

  { text:"SNSで感動した動画を見た。どうする？", choices:[
    {text:"「草」「エモいw」ってコメントして終わり",cool:3,hot:0},
    {text:"感動した気持ちを正直にコメントする",cool:0,hot:3},
    {text:"シェアはするが「まあこういうの好きな人いるよね」ってノリ",cool:2,hot:0},

  { text:"誰かが夢や目標を真剣に語り始めた。内心どう思う？", choices:[
    {text:"「ど、どわーwww 真剣すぎて直視できない」",cool:3,hot:0},
    {text:"応援したくなって前のめりで聞く",cool:0,hot:3},
    {text:"「お、おう…がんばって」ってなる",cool:2,hot:0},
    {text:"自分の夢も語りたくなってくる",cool:0,hot:2}
  ]},
  { text:"テスト前、クラスメートが「めっちゃ勉強した！」と言っている。", choices:[
    {text:"「がんばっちゃってて草」って思う",cool:3,hot:0},
    {text:"「すごい！何の科目？教えて！」ってなる",cool:0,hot:3},
    {text:"「ああ…そういうノリ…」ってちょっと距離をとる",cool:2,hot:0},
    {text:"「じゃ私も頑張らなきゃ！」って刺激を受ける",cool:0,hot:2}

  { text:"映画を見て泣いてしまった。友達に言う？", choices:[
    {text:"「泣いたとか恥ずかしいし絶対言わん」",cool:3,hot:0},

    {text:"「まあ…ちょっと目が潤んだかも」ってぼかす",cool:2,hot:0},
    {text:"友達みんなに「見て見て！」って勧める",cool:0,hot:2}

  { text:"グループLINEで突然「みんな大好き！」ってメッセが来た。", choices:[
    {text:"「うおw 何これw」ってドン引き気味に見る",cool:3,hot:0},
    {text:"「私も！！！」って即返信する",cool:0,hot:3},
    {text:"「ああ…こういうノリか…」ってスルーする",cool:2,hot:0},
    {text:"スタンプを大量に送る",cool:0,hot:2}

  { text:"好きなアーティストのライブに行くことになった。", choices:[
    {text:"「まあ行くけど、テンション上げすぎるのもなあ」",cool:3,hot:0},
    {text:"カウントダウンして毎日楽しみにしてる",cool:0,hot:3},
    {text:"「行ったとして、どうせ疲れるんだろうな」",cool:2,hot:0},
    {text:"グッズも全部揃えて完璧な状態で行く",cool:0,hot:2}
  ]},
  { text:"誰かが「今日の夕焼けきれいすぎた」とポストしてる。", choices:[
    {text:"「ポエム書いてて草」",cool:3,hot:0},
    {text:"「わかる！私も見た！」って反応する",cool:0,hot:3},
    {text:"「ああ…こういう感じの人か」",cool:2,hot:0},
    {text:"今すぐ外に見に行こうとする",cool:0,hot:2}
  ]},
  { text:"誰かがあなたを褒めてくれた。どう反応する？", choices:[
    {text:"「え、何が目的？」って疑う",cool:3,hot:0},
    {text:"「ありがとう！！」って素直に喜ぶ",cool:0,hot:3},
    {text:"「いや別に…」ってそっけなくする",cool:2,hot:0},

function getAnimalSVG(t,s){
  return {lion:svgLion,snake:svgSnake,fox:svgFox,cat:svgCat,owl:svgOwl,turtle:svgTurtle,
          dog:svgDog,rabbit:svgRabbit,panda:svgPanda,chick:svgChick,hamster:svgHamster,tanuki:svgTanuki}[t](s);
}
function getAnimal(pct, list){
  return list.find(a => pct >= a.range[0] && pct <= a.range[1]) || list[list.length-1];
}

// ── ゲーム状態 ──
const TOTAL = questions.length; // 15
const MAX_SCORE = TOTAL * 3;    // 45
let currentQ = 0;
let answers = []; // {cool, hot, choiceIndex} per question
let shuffledChoices = []; // 各問のシャッフル済み選択肢キャッシュ
let resultText = '';

function startQuiz(){
  currentQ = 0; answers = []; shuffledChoices = [];
  // 全問のシャッフル済み選択肢を事前生成
  questions.forEach(q => {
    shuffledChoices.push([...q.choices].sort(()=>Math.random()-.5));
  });
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  renderQuestion();
}

function renderQuestion(){
  document.getElementById('q-counter').textContent = `${currentQ+1} / ${TOTAL}`;
  document.getElementById('progress-fill').style.width = `${(currentQ/TOTAL)*100}%`;
  document.getElementById('q-text').textContent = questions[currentQ].text;
  document.getElementById('back-btn').disabled = currentQ === 0;

  const choices = shuffledChoices[currentQ];
  const el = document.getElementById('choices');
  el.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    // 既回答なら選択状態を復元
    if(answers[currentQ] !== undefined && answers[currentQ].choiceIndex === i){
      btn.classList.add(c.cool >= c.hot ? 'selected-cool' : 'selected-hot');
    }
    btn.onclick = () => selectChoice(c, i, btn);
    el.appendChild(btn);
  });

  // 広告：5問目・10問目
  const adArea = document.getElementById('quiz-ad-area');
  if(currentQ === 4 || currentQ === 9){
    adArea.innerHTML = `<div class="ad-slot" style="min-height:60px;margin-top:.5rem">📢 広告スペース（クイズ中）</div>`;
  } else {
    adArea.innerHTML = '';
  }
}

function selectChoice(choice, idx, btn){
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  btn.classList.add(choice.cool >= choice.hot ? 'selected-cool' : 'selected-hot');
  answers[currentQ] = { cool: choice.cool, hot: choice.hot, choiceIndex: idx };
  setTimeout(() => {
    currentQ++;
    if(currentQ >= TOTAL) showResult();
    else renderQuestion();
  }, 300);
}

function goBack(){
  if(currentQ === 0) return;
  answers.splice(currentQ-1, 1); // 直前の回答を削除
  currentQ--;
  renderQuestion();
}

function calcScores(){
  let cool = 0, hot = 0;
  answers.forEach(a => { cool += a.cool; hot += a.hot; });
  return {
    cp: Math.min(Math.round((cool / MAX_SCORE) * 100), 100),
    hp: Math.min(Math.round((hot  / MAX_SCORE) * 100), 100)
  };
}

function getResultComment(winner, cp, hp){
  if(winner === 'cool'){
    if(cp >= 83) return "バリバリの冷笑勢。「うおw」「ど、どわーwww」が口癖になってるでしょ。熱笑系の全力さを見て引いてしまうのはわかるけど、実はその情熱、ちょっとうらやましくない？";
    if(cp >= 66) return "かなり冷笑寄り。毒舌と観察眼が武器のタイプ。本気を出すのは恥ずかしいと感じているけど、内心では熱い人を羨ましく見ている。";
    if(cp >= 49) return "どちらかといえば冷笑寄り。完全に冷め切ってるわけじゃないけど、本気を人前で出すのはちょっと恥ずかしい感じ。";
    if(cp >= 33) return "ギリギリ冷笑系。熱笑の素質も十分あるのに、どこかブレーキをかけてしまうタイプ。";
    if(cp >= 17) return "かなりニュートラルな冷笑系。知的で落ち着いた目線で物事を見ている。感情を出すのが苦手なだけで、本当は感じやすい人。";
    return "超マイペースな冷笑系。熱量のある場にいても動じない鉄壁のペースを持っている。";
  } else {
    if(hp >= 83) return "純粋無垢な熱笑系。感動したら泣く、楽しかったら叫ぶ。そのエネルギーが周りを動かしてる。冷笑勢が「がんばっちゃってて草」と言いながら実は内心うらやましがってるの、気づいてる？";
    if(hp >= 66) return "かなり熱笑寄り。応援上手で、共感力が高い。エモいものに弱くてすぐ全力になる。その素直さが武器だよ。";
    if(hp >= 49) return "どちらかといえば熱笑寄り。「テンション上げすぎかな」って気にすることもあるけど、基本は素直に楽しめるいいタイプ。";
    if(hp >= 33) return "ギリギリ熱笑系。まだ殻が残っているけど、火がついたら最強になれる素質がある。";
    if(hp >= 17) return "こっそり熱笑系。外では静かでも、信頼できる人の前ではぽろっと熱い本音が出る。そのギャップが武器になる。";
    return "天然熱笑系。本人は冷静のつもりが、気づいたら全力になってる。その温かさで人が自然と集まってくる。";
  }
}

function showResult(){
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  const {cp, hp} = calcScores();
  const winner = cp >= hp ? 'cool' : 'hot';
  const animal = winner === 'cool' ? getAnimal(cp, coolAnimals) : getAnimal(hp, hotAnimals);
  const pct = winner === 'cool' ? cp : hp;

  resultText = `私は「${animal.name}」タイプでした！冷笑度${cp}% vs 熱笑度${hp}% #冷笑vs熱笑診断`;

  const card = document.getElementById('result-main-card');
  card.className = `result-main-card ${winner}-result`;
  const badge = document.getElementById('result-type-badge');
  badge.className = `result-type-badge ${winner==='cool'?'cool-badge':'hot-badge'}`;
  badge.textContent = winner === 'cool' ? '冷笑タイプ' : '熱笑タイプ';
  document.getElementById('result-animal-svg').innerHTML = getAnimalSVG(animal.svgType, 120);
  document.getElementById('result-pct').className = `result-pct ${winner}-pct`;
  document.getElementById('result-pct').textContent = `${pct}%`;
  document.getElementById('result-animal-name').textContent = animal.name;
  document.getElementById('result-animal-desc').textContent = animal.desc;
  document.getElementById('result-sub-scores').innerHTML = `
    <div class="sub-score-card"><div class="sub-score-label">冷笑度</div><div class="sub-score-value" style="color:#534AB7">${cp}%</div></div>
    <div class="sub-score-card"><div class="sub-score-label">熱笑度</div><div class="sub-score-value" style="color:#D4537E">${hp}%</div></div>`;
  document.getElementById('result-comment').textContent = getResultComment(winner, cp, hp);

  const chips = animal.traits.map(t=>`<span class="trait-chip">${t}</span>`).join('');
  document.getElementById('result-detail-area').innerHTML = `
    <div class="result-detail-card fade-up d3">
      <div class="detail-card-title">🔍 あなたの特性</div>
      <div class="trait-list">${chips}</div>
    </div>
    <div class="result-detail-card fade-up d4">
      <div class="detail-card-title">💑 相性</div>
      <div class="compat-row"><span class="compat-tag compat-good">◎ 相性いい</span><span>${animal.compat}</span></div>
      <div class="compat-row"><span class="compat-tag compat-bad">△ 苦手</span><span>${animal.incomp}</span></div>
    </div>
    <div class="result-detail-card fade-up d4">
      <div class="detail-card-title">💡 あなたへのアドバイス</div>
      <div>${animal.advice}</div>
    </div>`;
}

function shareX(){
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(resultText)}&url=${encodeURIComponent(location.href)}`,'_blank');
}
function shareLine(){
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(resultText+' ')}`,'_blank');
}
function copyLink(){
  const btn = document.getElementById('copy-btn');
  navigator.clipboard ? navigator.clipboard.writeText(resultText+' '+location.href) : (() => {
    const d=document.createElement('textarea'); d.value=resultText+' '+location.href;
    document.body.appendChild(d); d.select(); document.execCommand('copy'); document.body.removeChild(d);
  })();
  btn.textContent='✅ コピーしました！';
  setTimeout(()=>btn.textContent='🔗 リンクをコピー', 2000);
}
function resetQuiz(){
  currentQ=0; answers=[]; shuffledChoices=[]; resultText='';
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('title-screen').classList.add('active');
  window.scrollTo(0,0);
}
</script>
